name: CI

on:
  pull_request:
    branches: [ "develop" ]

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create application files
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.APPLICATION }}"  > ./src/main/resources/application.yml
          echo "${{ secrets.APPLICATION_LOCAL }}"  > ./src/main/resources/application-local.yml
          echo "${{ secrets.APPLICATION_DEV }}"  > ./src/main/resources/application-dev.yml
        shell: bash

      - name: Set Environment for CI
        run: echo "ELASTICSEARCH_URI=http://localhost:9200" >> $GITHUB_ENV
        shell: bash

      - name: Build Elasticsearch Image with Nori
        run: |
          docker build -t elasticsearch-with-nori:8.17.1 -f Dockerfile.elasticsearch .
        shell: bash

      - name: Start Elasticsearch
        run: |
          docker run -d --name elasticsearch-container \
            -p 9200:9200 \
            -e "discovery.type=single-node" \
            -e "ES_JAVA_OPTS=-Xms1g -Xmx1g" \
            -e "xpack.security.enabled=false" \
            elasticsearch-with-nori:8.17.1
        shell: bash

      - name: Wait for Elasticsearch
        run: |
          echo "Waiting for Elasticsearch to be available..."
          timeout 60s bash -c 'until curl -s http://localhost:9200 > /dev/null; do sleep 2; echo "Still waiting..."; done'
          echo "Elasticsearch is up!"
        shell: bash

      - name: Create Elasticsearch Index
        run: |
          echo "Creating Elasticsearch index..."
          curl -X PUT "http://localhost:9200/lost_item" \
            -H "Content-Type: application/json" \
            -d '
            {
              "settings": {
                "analysis": {
                  "tokenizer": {
                    "edge_ngram_tokenizer": {
                      "type": "edge_ngram",
                      "min_gram": 2,
                      "max_gram": 5,
                      "token_chars": ["letter", "digit", "whitespace"]
                    },
                    "nori_tokenizer": {
                      "type": "nori_tokenizer"
                    }
                  },
                  "analyzer": {
                    "nori_analyzer": {
                      "type": "custom",
                      "tokenizer": "nori_tokenizer",
                      "filter": ["nori_readingform", "nori_part_of_speech"]
                    },
                    "ngram_analyzer": {
                      "type": "custom",
                      "tokenizer": "edge_ngram_tokenizer"
                    }
                  }
                }
              },
              "mappings": {
                "properties": {
                  "name": {
                    "type": "text",
                    "fields": {
                      "standard": {
                        "type": "text",
                        "analyzer": "standard"
                      },
                      "nori": {
                        "type": "text",
                        "analyzer": "nori_analyzer"
                      },
                      "ngram": {
                        "type": "text",
                        "analyzer": "ngram_analyzer"
                      }
                    }
                  },
                  "date": {
                    "type": "date"
                  },
                  "categoryId": {
                    "type": "long"
                  },
                  "region": {
                    "type": "text",
                    "analyzer": "nori_analyzer"
                  },
                  "location": {
                    "type": "geo_point"
                  }
                }
              }
            }'
        shell: bash

      - name: Check Elasticsearch Health
        run: curl -s http://localhost:9200/_cluster/health?pretty
        shell: bash

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build
        shell: bash

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          junit_files: '**/build/test-results/test/TEST-*.xml'

      - name: Report test Coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.1
        with:
          title: 📝 Test Coverage Report
          paths: ${{ github.workspace }}/**/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          update-comment: true