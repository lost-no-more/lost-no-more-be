spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

oauth2:
  kakao:
    client-id: test-client-id
    client-secret: test-client-secret
    admin-key: test-admin-key
    redirect-url: http://localhost:8080/oauth/callback/kakao

security:
  jwt:
    token:
      secret-key: test-secret-key-for-testing-purposes-only