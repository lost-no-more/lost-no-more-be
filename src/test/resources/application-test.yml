oauth2:
  google:
    client-id: google-client-id
    client-secret: google-client-secret
    redirect-url: google-redirect-url
    scope: email
    code-url: google-code-url
    token-url: google-token-url
    user-info-url: google-user-info-url
  kakao:
    client-id: kakao-client-id
    client-secret: kakao-client-secret
    redirect-url: kakao-redirect-url
    scope: account_email
    code-url: kakao-code-url
    token-url: kakao-token-url
    user-info-url: kakao-user-info-url

security:
  jwt:
    token:
      access-secret-key: accessSecretKey
      refresh-secret-key: refreshSecretKey
      access-token-expired: 30m
      refresh-token-expired: 14d